<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPS Test Refined</title>
  <style>
    :root {
      --bg-color: #0a0b10;
      --card-bg: rgba(255, 255, 255, 0.05);
      --primary-glow: #00f2ff;
      --secondary-glow: #7000ff;
      --text-color: #ffffff;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', 'Orbitron', sans-serif; /* 建议引入科技感字体 */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 800px;
    }

    /* 标题发光效果 */
    .glow-text {
      font-size: 3rem;
      letter-spacing: 5px;
      margin-bottom: 5px;
      background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
    }

    /* 数据卡片布局 */
    .stats-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px 0;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 15px 30px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      min-width: 100px;
    }

    .stat-card.highlight {
      border-color: var(--primary-glow);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
    }

    .stat-card .label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 5px;
    }

    .stat-card .value {
      font-size: 1.8rem;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace; /* 等宽数字 */
    }

    /* 核心点击球体 */
    .main-area {
      display: flex;
      justify-content: center;
      margin: 50px 0;
    }

    .click-circle {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, #1a1c25 0%, #0a0b10 100%);
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.1s;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .click-circle:active {
      transform: scale(0.95);
    }

    .click-circle::before {
      content: '';
      position: absolute;
      top: -5px; left: -5px; right: -5px; bottom: -5px;
      border-radius: 50%;
      background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
      z-index: -1;
      opacity: 0.6;
      filter: blur(10px);
    }

    .click-text { font-size: 1.5rem; font-weight: bold; display: none; }
    .start-hint { font-size: 1.2rem; letter-spacing: 2px; color: var(--primary-glow); }

    /* 底部按钮样式 */
    .mode-selector {
      margin-top: 30px;
    }

    .mode-btn {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 8px 20px;
      margin: 0 5px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .mode-btn.active, .mode-btn:hover {
      border-color: var(--primary-glow);
      color: var(--primary-glow);
      background: rgba(0, 242, 255, 0.1);
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1 class="glow-text">CPS TEST</h1>
    <p class="subtitle">挑战你的手指极限</p>
  </header>

  <div class="stats-container">
    <div class="stat-card">
      <span class="label">TIME</span>
      <span class="value" id="time">5.00</span>
    </div>
    <div class="stat-card highlight">
      <span class="label">CPS</span>
      <span class="value" id="cps">0.0</span>
    </div>
    <div class="stat-card">
      <span class="label">CLICKS</span>
      <span class="value" id="clicks">0</span>
    </div>
  </div>

  <div class="main-area">
    <div class="click-circle" id="clicker">
      <div class="inner-content">
        <span class="start-hint">START</span>
        <span class="click-text">CLICK!</span>
      </div>
      <div class="ring"></div>
    </div>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active">10s</button>
    <button class="mode-btn">30s</button>
    <button class="mode-btn">60s</button>
    <button class="mode-btn">100s</button>
  </div>
</div>
</body>
</html>
